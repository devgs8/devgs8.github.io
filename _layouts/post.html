---
layout: default
---

<style>
  .nav-buttons {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 500;
    text-decoration: none;
    border-radius: 8px;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .btn-primary {
    background: #0078D4;
    color: white;
    border: 2px solid #0078D4;
  }
  .btn-primary:hover {
    background: transparent;
    color: #0078D4;
    transform: translateY(-2px);
  }
  .btn-secondary {
    background: #6c757d;
    color: white;
    border: 2px solid #6c757d;
  }
  .btn-secondary:hover {
    background: transparent;
    color: #6c757d;
    transform: translateY(-2px);
  }
  .post-header {
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid #eee;
  }
  .post-title {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .post-meta {
    color: #777;
    font-size: 0.9rem;
  }
  .post-content {
    line-height: 1.8;
    font-size: 1.05rem;
  }
  .post-content h2 {
    margin-top: 2rem;
    color: #0078D4;
  }
  .post-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 2px solid #eee;
  }
</style>

<div class="nav-buttons">
  <a href="/" class="btn btn-secondary">← Back to Home</a>
  <a href="/" class="btn btn-primary">🏠 Home</a>
</div>

<div class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">📅 {{ page.date | date: "%B %d, %Y" }} • 📂 {{ page.categories | join: ", " }}</p>
</div>

<div class="post-content">
  {{ content }}
</div>

<div class="post-footer">
  <div class="nav-buttons">
    <a href="/" class="btn btn-secondary">← Back to Home</a>
    <a href="/" class="btn btn-primary">🏠 Home</a>
  </div>
</div>
