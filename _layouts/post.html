---
layout: default
---

<style>
  .nav-buttons {
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
    margin-bottom: 2rem;
  }
  .btn {
    padding: 0.5rem 1rem;
    text-decoration: none;
    color: #0078D4;
    font-weight: 500;
  }
  .btn:hover {
    text-decoration: underline;
  }
  .post-header {
    margin-bottom: 2rem;
    border-bottom: 1px solid #eee;
    padding-bottom: 1rem;
  }
  .post-title {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }
  .post-meta {
    color: #777;
    font-size: 0.9rem;
  }
  .post-category {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    font-size: 0.7rem;
    font-weight: 600;
    border-radius: 20px;
    margin-right: 0.5rem;
  }
  .category-java {
    background: #f89820;
    color: white;
  }
  .category-english {
    background: #38ef7d;
    color: #1a2a3a;
  }
  .post-content {
    line-height: 1.8;
    font-size: 1.05rem;
  }
  .post-content h2 {
    margin-top: 2rem;
    color: #0078D4;
  }
  .post-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid #eee;
  }
  @media (max-width: 768px) {
    .post-title {
      font-size: 1.5rem;
    }
  }
</style>

<div class="nav-buttons">
  <a href="/" class="btn">← Home</a>
  <a href="/about" class="btn">About</a>
</div>

<div class="post-header">
  {% if page.categories contains "java" %}
    <span class="post-category category-java">☕ Java</span>
  {% elsif page.categories contains "english" %}
    <span class="post-category category-english">🇬🇧 English</span>
  {% endif %}
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">📅 {{ page.date | date: "%B %d, %Y" }}</p>
</div>

<div class="post-content">
  {{ content }}
</div>

<div class="post-footer">
  <a href="/" class="btn">← Back to Home</a>
</div>
